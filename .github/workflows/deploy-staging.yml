name: Deploy Staging (Azure VM via SSH)

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          password: ${{ secrets.STAGING_SSH_PASSWORD }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT }}
          script: |
            set -euo pipefail
            WORKDIR="${{ secrets.STAGING_WORKDIR }}"
            if [ -z "$WORKDIR" ]; then
              echo "STAGING_WORKDIR not set. Add it as a repository secret."
              exit 1
            fi
            if [ ! -d "$WORKDIR/.git" ]; then
              echo "Missing repo at $WORKDIR. Clone it once on the VM and set STAGING_WORKDIR accordingly."
              exit 1
            fi
            cd "$WORKDIR"
            git fetch --all --prune
            git checkout main
            git pull --ff-only
            docker compose -f compose.staging.yml -p innernets-staging up -d --build --remove-orphans

      - name: Update Surfer service (optional)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          password: ${{ secrets.STAGING_SSH_PASSWORD }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT }}
          script: |
            set -euo pipefail
            SWORK="${{ secrets.SURFER_WORKDIR }}"
            if [ -z "$SWORK" ]; then
              echo "SURFER_WORKDIR not set; skipping Surfer update."
              exit 0
            fi
            if [ ! -d "$SWORK/.git" ]; then
              echo "Missing Surfer repo at $SWORK. Clone it once on the VM and set SURFER_WORKDIR accordingly."
              exit 1
            fi
            cd "$SWORK"
            git fetch --all --prune
            git checkout main || true
            git pull --ff-only || true
            docker compose up -d --build --remove-orphans

      - name: Verify API health
        run: |
          set -euo pipefail
          HOST="${{ vars.API_STAGING_HOST }}"
          if [ -z "$HOST" ]; then HOST='api-staging.innernets.ai'; fi
          curl -fsS "https://$HOST/healthz"
